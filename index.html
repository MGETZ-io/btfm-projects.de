<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTFM Projects | Maintenance</title>
    <style>
        :root {
            --accent: #8a2be2; /* Kräftiges Lila */
            --bg: #050505;
            --card-bg: #0f0f12;
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Subtiler lila Glow im Hintergrund */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(180px);
            opacity: 0.15;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            padding: 50px 30px;
            border-radius: 20px;
            border: 1px solid #1f1f23;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        p {
            color: #888;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Partner Sektion */
        .partner-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: rgba(138, 43, 226, 0.1);
            border: 1px solid var(--accent);
            border-radius: 50px;
            font-weight: 600;
            color: var(--text);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
        }

        .partner-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.3);
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="logo">BTFM PROJECTS</div>
        
        <div class="card">
            <h2>Wartungsarbeiten</h2>
            <p>Wir bereiten das nächste Level vor. <br>BTFM Projects ist bald wieder online.</p>
            
            <div class="partner-badge">
                <span class="dot"></span>
                Partner with Hustensaft
            </div>
        </div>

        <footer>
            &copy; 2026 BTFM PROJECTS
        </footer>
    </div>

    <script>
        // Kleiner Effekt: Sanftes Erscheinen beim Laden
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.container');
            container.style.opacity = '0';
            container.style.transition = 'opacity 1s ease';
            
            setTimeout(() => {
                container.style.opacity = '1';
            }, 100);
        });
    </script>

</body>
</html>
