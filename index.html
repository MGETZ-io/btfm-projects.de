<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTFM PROJECTS | Official Hub</title>
    <style>
        body {
            background-color: #0a001a; /* Tiefes Dunkellila */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .hub-container {
            background: linear-gradient(180deg, #150030 0%, #001f4d 100%); /* Lila zu Blau Verlauf */
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #0055ff;
            box-shadow: 0 0 40px rgba(0, 85, 255, 0.3);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #0055ff;
            letter-spacing: 3px;
        }

        .tagline {
            color: #a280ff;
            font-size: 1.2rem;
            margin-bottom: 30px;
            display: block;
        }

        .project-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #330066;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: scale(1.05);
            border-color: #0055ff;
            background: rgba(0, 85, 255, 0.1);
        }

        .project-card h3 {
            margin: 0 0 5px 0;
            color: #4d94ff;
        }

        .project-card p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .rules-link {
            display: block;
            text-decoration: none;
            background: #0055ff;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .rules-link:hover {
            background: #0077ff;
            box-shadow: 0 0 20px #0055ff;
            transform: translateY(-3px);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>BTFM PROJECTS</h1>
        <span class="tagline">Das ultimative Multi-Minecraft Projekt</span>

        <div class="project-grid">
            <div class="project-card">
                <h3>BTFM Tower</h3>
                <p>Das Wahrzeichen unserer Welt.</p>
            </div>
            <div class="project-card">
                <h3>BTFM Freizeitpark</h3>
                <p>Action, Spaß und Adrenalin.</p>
            </div>
        </div>

        <a href="Regelwerk.html" class="rules-link">Projekt-Regeln lesen</a>

        <div class="footer">
            BTFM PROJECTS &bull; 2026 &bull; Join the Adventure
        </div>
    </div>

</body>
</html>
