<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTFM Projects | Wartung</title>
    <style>
        /* CSS - Design & Layout */
        :root {
            --primary: #007bff;
            --bg: #0a0a0b;
            --card-bg: #141415;
            --text-main: #ffffff;
            --text-dim: #666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 10;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .maintenance-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        p {
            font-size: 1rem;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Ladebalken */
        .progress-wrapper {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #status-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #333;
        }

        /* Subtiler Hintergrund-Effekt */
        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.1;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="logo">BTFM Projects</div>
        
        <div class="maintenance-card">
            <h1>Wartungsmodus</h1>
            <p>Wir führen aktuell wichtige Updates durch, um die Stabilität und Sicherheit der BTFM Projects zu gewährleisten.</p>
            
            <div class="progress-wrapper">
                <div id="progress-bar"></div>
            </div>
            <div id="status-label">System-Check eingeleitet...</div>
        </div>

        <footer>
            &copy; 2026 BTFM Projects
        </footer>
    </div>

    <script>
        // JavaScript - Dynamische Updates
        document.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            const label = document.getElementById('status-label');
            
            const steps = [
                { p: 15, t: "Server-Resonanz prüfen..." },
                { p: 35, t: "Skripte werden optimiert..." },
                { p: 60, t: "Datenbank-Synchronisierung..." },
                { p: 85, t: "Cache-Validierung..." },
                { p: 98, t: "Finaler System-Check..." }
            ];

            let currentStep = 0;

            function runSimulation() {
                if (currentStep < steps.length) {
                    bar.style.width = steps[currentStep].p + "%";
                    label.innerText = steps[currentStep].t;
                    currentStep++;
                    
                    // Zufälliges Timing für die nächsten Schritte (2-4 Sekunden)
                    setTimeout(runSimulation, 2000 + Math.random() * 2000);
                }
            }

            // Start nach einer kurzen Verzögerung
            setTimeout(runSimulation, 1000);
        });
    </script>

</body>
</html>
