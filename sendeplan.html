<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTFM Sendeplan</title>
    <style>
        :root {
            --bg-deep: #0b0614;
            --card-dark: #1c1236;
            --btfm-blue: #0077ff;
            --btfm-live: #ff4d4d; /* Rot für Live-Status */
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
            --border-purple: #2d1f4d;
        }

        html, body {
            background-color: var(--bg-deep) !important;
            color: var(--text-white) !important;
            margin: 0;
            padding: 15px;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .sendeplan-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-dark);
            border: 1px solid var(--border-purple);
            border-radius: 8px;
            overflow: hidden;
        }

        .header-bar {
            background: #160d2b;
            padding: 20px;
            border-bottom: 2px solid var(--btfm-blue);
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .show-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .show-item {
            padding: 20px;
            border-bottom: 1px solid var(--border-purple);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* LIVE-MARKIERUNG */
        .show-item.is-live {
            border-left: 4px solid var(--btfm-live);
            background: rgba(255, 77, 77, 0.05);
        }

        .live-indicator {
            background: var(--btfm-live);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-right: 10px;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .show-info {
            font-size: 1.1rem;
            color: var(--text-white);
            display: flex;
            align-items: center;
        }

        .show-title { font-weight: bold; }
        .show-mod { color: var(--btfm-blue); }

        .show-time {
            font-family: monospace;
            background: var(--border-purple);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.95rem;
            color: var(--text-gray);
            white-space: nowrap;
        }

        .no-data, .error-msg {
            padding: 40px;
            text-align: center;
            color: var(--text-gray);
        }
    </style>
</head>
<body>

<div class="sendeplan-wrapper">
    <div class="header-bar">Sendeplan Übersicht</div>
    <div id="api-target">
        <div class="no-data">Daten werden geladen...</div>
    </div>
</div>

<script>
    const API_URL = 'https://backend.btfm-projects.de/max/api_sendeplan.php';

    async function loadSendeplan() {
        const target = document.getElementById('api-target');
        
        try {
            const response = await fetch(API_URL);
            const json = await response.json();

            // Prüfung auf "status === success" (wie in deiner PHP-API definiert)
            if (json.status === "success" && json.data.length > 0) {
                const now = new Date();
                let listHtml = '<ul class="show-list">';
                
                json.data.forEach(item => {
                    const startTime = new Date(item.start_time);
                    const endTime = new Date(item.end_time);
                    
                    // Live-Check Logik
                    const isLive = now >= startTime && now <= endTime;

                    const startStr = startTime.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
                    const endStr = endTime.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
                    const dateStr = startTime.toLocaleDateString('de-DE', {day: '2-digit', month:'2-digit'});

                    listHtml += `
                        <li class="show-item ${isLive ? 'is-live' : ''}">
                            <div class="show-info">
                                ${isLive ? '<span class="live-indicator">LIVE</span>' : ''}
                                <div>
                                    <span class="show-title">${escape(item.title)}</span> 
                                    mit 
                                    <span class="show-mod">${escape(item.moderator)}</span>
                                </div>
                            </div>
                            <div class="show-time">
                                ${dateStr} | ${startStr} - ${endStr} Uhr
                            </div>
                        </li>`;
                });

                listHtml += '</ul>';
                target.innerHTML = listHtml;
            } else {
                target.innerHTML = '<div class="no-data">Aktuell keine Sendungen eingetragen.</div>';
            }
        } catch (err) {
            target.innerHTML = '<div class="error-msg">Fehler beim Laden der Sendedaten.</div>';
        }
    }

    function escape(str) {
        const p = document.createElement('p');
        p.textContent = str;
        return p.innerHTML;
    }

    loadSendeplan();
    // Alle 60 Sekunden aktualisieren, um den Live-Status zu prüfen
    setInterval(loadSendeplan, 60000);
</script>

</body>
</html>
