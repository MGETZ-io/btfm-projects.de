<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTFM Sendeplan Einbettung</title>
    <style>
        :root {
            --bg-color: #0b0614;
            --card-bg: #1c1236;
            --accent-blue: #0077ff;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --border: #2d1f4d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent; /* Erlaubt Einbettung in andere Seiten */
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .sendeplan-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .sendeplan-header {
            background-color: var(--border);
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--accent-blue);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--text-dim);
            padding: 12px 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 1rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: rgba(0, 119, 255, 0.05);
        }

        .show-title {
            color: #ffffff;
            font-weight: bold;
            display: block;
        }

        .moderator {
            color: var(--accent-blue);
            font-size: 0.9rem;
        }

        .time-badge {
            background: var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #fff;
        }

        .loading, .error {
            padding: 40px;
            text-align: center;
            color: var(--text-dim);
        }

        .error { color: #ff4d4d; }
    </style>
</head>
<body>

<div class="sendeplan-container">
    <div class="sendeplan-header">Aktueller Sendeplan</div>
    <div id="sendeplan-content">
        <div class="loading">Sendeplan wird geladen...</div>
    </div>
</div>

<script>
    // URL deiner API
    const API_URL = 'https://backend.btfm-projects.de/max/api_sendeplan.php';

    async function fetchSendeplan() {
        const content = document.getElementById('sendeplan-content');
        
        try {
            const response = await fetch(API_URL);
            const result = await response.json();

            if (result.success && result.data.length > 0) {
                let html = `<table>
                    <thead>
                        <tr>
                            <th>Sendung / Moderator</th>
                            <th>Zeitraum</th>
                        </tr>
                    </thead>
                    <tbody>`;

                result.data.forEach(show => {
                    // Zeitformatierung (HH:mm)
                    const start = new Date(show.start_time).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
                    const end = new Date(show.end_time).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
                    const date = new Date(show.start_time).toLocaleDateString('de-DE', {day: '2-digit', month:'2-digit'});

                    html += `
                        <tr>
                            <td>
                                <span class="show-title">${escapeHtml(show.title)}</span>
                                <span class="moderator">${escapeHtml(show.username)}</span>
                            </td>
                            <td>
                                <span class="time-badge">${date} | ${start} - ${end}</span>
                            </td>
                        </tr>`;
                });

                html += `</tbody></table>`;
                content.innerHTML = html;
            } else {
                content.innerHTML = '<div class="loading">Aktuell sind keine weiteren Sendungen geplant.</div>';
            }
        } catch (error) {
            console.error('Fehler beim Abrufen des Sendeplans:', error);
            content.innerHTML = '<div class="error">Fehler beim Laden des Sendeplans. Bitte versuchen Sie es später erneut.</div>';
        }
    }

    // Hilfsfunktion gegen XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Initial laden
    fetchSendeplan();
    // Alle 5 Minuten aktualisieren
    setInterval(fetchSendeplan, 300000);
</script>

</body>
</html>
