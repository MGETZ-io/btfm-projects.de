<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTFM Sendeplan</title>
    <style>
        /* DESIGN-FIX: Dunkler Hintergrund erzwungen */
        :root {
            --bg-deep: #0b0614;
            --card-dark: #1c1236;
            --btfm-blue: #0077ff;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
            --border-purple: #2d1f4d;
        }

        /* Verhindert weißes Aufblitzen */
        html, body {
            background-color: var(--bg-deep) !important;
            color: var(--text-white) !important;
            margin: 0;
            padding: 15px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .sendeplan-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-dark);
            border: 1px solid var(--border-purple);
            border-radius: 8px;
            overflow: hidden;
        }

        .header-bar {
            background: var(--sidebar-bg, #160d2b);
            padding: 20px;
            border-bottom: 2px solid var(--btfm-blue);
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .show-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .show-item {
            padding: 20px;
            border-bottom: 1px solid var(--border-purple);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .show-item:hover {
            background: rgba(0, 119, 255, 0.05);
        }

        .show-item:last-child {
            border-bottom: none;
        }

        /* Format: (Titel) mit (Moderator) */
        .show-info {
            font-size: 1.1rem;
            color: var(--text-white);
        }

        .show-title {
            font-weight: bold;
            color: var(--text-white);
        }

        .show-mod {
            color: var(--btfm-blue);
        }

        .show-time {
            font-family: monospace;
            background: var(--border-purple);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.95rem;
            color: var(--text-gray);
            white-space: nowrap;
        }

        .no-data {
            padding: 40px;
            text-align: center;
            color: var(--text-gray);
        }

        .error-msg {
            color: #ff4d4d;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="sendeplan-wrapper">
    <div class="header-bar">Sendeplan Übersicht</div>
    <div id="api-target">
        <div class="no-data">Daten werden geladen...</div>
    </div>
</div>

<script>
    const API_URL = 'https://backend.btfm-projects.de/max/api_sendeplan.php';

    async function loadSendeplan() {
        const target = document.getElementById('api-target');
        
        try {
            const response = await fetch(API_URL);
            const json = await response.json();

            if (json.success && json.data.length > 0) {
                let listHtml = '<ul class="show-list">';
                
                json.data.forEach(item => {
                    const start = new Date(item.start_time).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
                    const end = new Date(item.end_time).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
                    const date = new Date(item.start_time).toLocaleDateString('de-DE', {day: '2-digit', month:'2-digit'});

                    listHtml += `
                        <li class="show-item">
                            <div class="show-info">
                                <span class="show-title">(${escape(item.title)})</span> 
                                mit 
                                <span class="show-mod">(${escape(item.username)})</span>
                            </div>
                            <div class="show-time">
                                ${date} | ${start} - ${end} Uhr
                            </div>
                        </li>`;
                });

                listHtml += '</ul>';
                target.innerHTML = listHtml;
            } else {
                target.innerHTML = '<div class="no-data">Aktuell keine Sendungen eingetragen.</div>';
            }
        } catch (err) {
            target.innerHTML = '<div class="error-msg">Fehler beim Laden der Sendedaten.</div>';
        }
    }

    function escape(str) {
        const p = document.createElement('p');
        p.textContent = str;
        return p.innerHTML;
    }

    loadSendeplan();
    // Alle 5 Minuten aktualisieren
    setInterval(loadSendeplan, 300000);
</script>

</body>
</html>
